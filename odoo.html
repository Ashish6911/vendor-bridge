<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Store Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    color:white;
}

.wrapper{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:35px;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin-bottom:20px;
}

.subtitle{
    text-align:center;
    margin-bottom:30px;
    color:#cbd5e1;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
}

input[type="submit"],
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#3b82f6,#8b5cf6);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.store{
    display:none;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.product{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:20px;
}

.price{
    color:#60a5fa;
    font-size:22px;
    margin:10px 0;
}
</style>
</head>
<body>

<div class="wrapper">

    <!-- LOGIN / SIGNUP -->
    <div id="authPage">

        <h1>LOGIN / SIGNUP</h1>
        <p class="subtitle">JWT Authentication Demo</p>

        <div class="container">

            <div class="card">

                <h2>Login</h2>

                <form id="loginForm">

                    <input
                        type="text"
                        id="email"
                        placeholder="Enter Email"
                    >

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                    >

                    <input
                        type="submit"
                        value="Login"
                    >

                </form>

            </div>

            <div class="card">

                <h2>Create Account</h2>

                <form id="signupForm">

                    <input
                        type="text"
                        id="new_email"
                        placeholder="Enter Email"
                    >

                    <input
                        type="password"
                        id="new_password"
                        placeholder="Create Password"
                    >

                    <input
                        type="submit"
                        value="Sign Up"
                    >

                </form>

            </div>

        </div>

    </div>

    <!-- STORE PAGE -->
    <div id="storePage" class="store">

        <h1>🛒 ONLINE STORE</h1>

        <h2 id="welcomeText"></h2>

        <div class="products">

            <div class="product">
                <h3>iPhone 17</h3>
                <div class="price">₹79,999</div>
                <button>Buy Now</button>
            </div>

            <div class="product">
                <h3>Gaming Laptop</h3>
                <div class="price">₹89,999</div>
                <button>Buy Now</button>
            </div>

            <div class="product">
                <h3>AirPods Pro</h3>
                <div class="price">₹19,999</div>
                <button>Buy Now</button>
            </div>

        </div>

        <br>

        <button onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script>

async function checkToken(){

    const token = localStorage.getItem("token");

    if(!token){
        return;
    }

    try{

        const response =
        await fetch(
            "http://127.0.0.1:8000/profile",
            {
                headers:{
                    Authorization:
                    "Bearer " + token
                }
            }
        );

        const data = await response.json();

        if(data.success){

            document
            .getElementById("authPage")
            .style.display = "none";

            document
            .getElementById("storePage")
            .style.display = "block";

            document
            .getElementById("welcomeText")
            .innerText =
            "Welcome " + data.email;
        }

    }catch(err){

        localStorage.removeItem("token");
    }
}

checkToken();

document
.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData();

    formData.append(
        "email",
        document.getElementById("email").value
    );

    formData.append(
        "password",
        document.getElementById("password").value
    );

    const response =
    await fetch(
        "http://127.0.0.1:8000/login",
        {
            method:"POST",
            body:formData
        }
    );

    const data = await response.json();

    if(data.success){

        localStorage.setItem(
            "token",
            data.access_token
        );

        location.reload();

    }else{

        alert(data.message);
    }

});

document
.getElementById("signupForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData();

    formData.append(
        "new_email",
        document.getElementById("new_email").value
    );

    formData.append(
        "new_password",
        document.getElementById("new_password").value
    );

    const response =
    await fetch(
        "http://127.0.0.1:8000/signup",
        {
            method:"POST",
            body:formData
        }
    );

    const data = await response.json();

    alert(data.message);

});

function logout(){

    localStorage.removeItem("token");

    location.reload();
}

</script>

</body>
</html>
